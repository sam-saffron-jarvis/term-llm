x-term-llm:
  purpose: "{{name}} agent workspace"
  workspace: /home/agent
  default_service: app
  shell: /bin/zsh
  preferred_cli: term-llm
  agent: "{{name}}"
  exec_recipes:
    agent:
      description: "Chat with this term-llm agent"
      command:
        - term-llm
        - chat
        - "@{{name}}"
        - --yolo
    seed-chatgpt-auth:
      description: "Copy host ChatGPT OAuth credentials into this workspace"
      copy_files:
        - from: "{{config_dir}}/chatgpt_oauth.json"
          to: "{{workspace}}/.config/term-llm/chatgpt_oauth.json"
          mode: "0600"
          missing_hint: "Run `term-llm auth login chatgpt` on the host first."
      post_run_hint: "Restart long-running serve/jobs processes if they cached auth state: term-llm contain restart {{name}}"
      command:
        - true
    seed-copilot-auth:
      description: "Copy host GitHub Copilot OAuth credentials into this workspace"
      copy_files:
        - from: "{{config_dir}}/copilot_oauth.json"
          to: "{{workspace}}/.config/term-llm/copilot_oauth.json"
          mode: "0600"
          missing_hint: "Run `term-llm auth login copilot` on the host first."
      post_run_hint: "Restart long-running serve/jobs processes if they cached auth state: term-llm contain restart {{name}}"
      command:
        - true
    seed-gemini-cli-auth:
      description: "Copy host Gemini CLI OAuth credentials into this workspace"
      copy_files:
        - from: "{{home}}/.gemini/oauth_creds.json"
          to: "{{workspace}}/.gemini/oauth_creds.json"
          mode: "0600"
          missing_hint: "Run `gemini` on the host to authenticate first."
      post_run_hint: "Restart long-running serve/jobs processes if they cached auth state: term-llm contain restart {{name}}"
      command:
        - true

services:
  app:
    build:
      context: "{{agent_image_dir}}"
      dockerfile: "Dockerfile.${AGENT_DISTRO:-arch}"
      args:
        AGENT_BASE_IMAGE: "${AGENT_BASE_IMAGE:-archlinux:latest}"
        TERM_LLM_VERSION: "${TERM_LLM_VERSION:-latest}"
    platform: "${AGENT_PLATFORM:-linux/amd64}"
    image: term-llm-agent:${AGENT_DISTRO:-arch}-{{name}}-{{agent_image_hash}}
    user: root
    restart: unless-stopped
    env_file: .env
    environment:
      AGENT_NAME: "{{name}}"
    ports:
      - "${WEB_PORT:-8081}:8081"
    volumes:
      - {{name}}-state:/home/agent
    labels:
      org.term-llm.contain: "true"
      org.term-llm.contain.name: "{{name}}"
      org.term-llm.contain.config_dir: "{{config_dir}}"
      org.term-llm.contain.service: "app"
      org.term-llm.contain.agent: "{{name}}"
      org.term-llm.contain.user: "agent"

volumes:
  {{name}}-state:
