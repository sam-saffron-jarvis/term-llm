x-term-llm:
  purpose: "{{name}} ollama runtime"
  workspace: /root
  default_service: ollama
  shell: /bin/sh

services:
  ollama:
    image: "ollama/ollama:{{ollama_image_tag}}"
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - {{name}}-models:/root/.ollama
    # For Nvidia GPU access (requires nvidia-container-toolkit on the host),
    # uncomment the deploy block below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    labels:
      org.term-llm.contain: "true"
      org.term-llm.contain.name: "{{name}}"
      org.term-llm.contain.config_dir: "{{config_dir}}"
      org.term-llm.contain.service: "ollama"

volumes:
  {{name}}-models:
