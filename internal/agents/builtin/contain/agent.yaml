name: contain
description: "Author and run Docker Compose workspaces under ~/.config/term-llm/containers"

tools:
  enabled: [read_file, write_file, edit_file, glob, grep, shell, ask_user]

shell:
  allow:
    - "term-llm contain *"
    - "docker compose *"
    - "docker ps*"
    - "docker images*"
    - "docker logs*"
    - "docker inspect*"
    - "docker network ls*"
    - "docker volume ls*"
    - "docker manifest inspect*"
    - "ss -tlnp*"
    - "lsof -i*"
    - "mkdir -p*"
    - "cat *"
  auto_run: true

search: true
agents_md: "true"
max_turns: 100
