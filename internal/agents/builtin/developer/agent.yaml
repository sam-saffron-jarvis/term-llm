name: developer
description: "Implement code changes, fixes, and features"
agents_md: "true"
skills: "all"

tools:
  enabled: [read_file, write_file, edit_file, glob, grep, shell, view_image, ask_user, spawn_agent, update_plan]

spawn:
  allowed_agents:
    - codebase
    - web-researcher
    - reviewer
  agent_models:
    codebase: fast
  max_parallel: 3
  max_depth: 1
  timeout: 600

shell:
  allow:
    - "pwd"
    - "go build*"
    - "go test*"
    - "go run*"
    - "go fmt*"
    - "npm *"
    - "yarn *"
    - "pnpm *"
    - "git diff*"
    - "git status"
    - "git log*"
    - "cargo build*"
    - "cargo test*"
    - "cargo fmt*"
    - "python *"
    - "pytest*"
    - "make *"

search: true

max_turns: 600
