name: planner
description: "Plan and break down complex tasks before implementation"
skills: "all"

tools:
  enabled: [read_file, write_file, edit_file, glob, grep, shell, ask_user, initiate_handover, spawn_agent]
spawn:
  allowed_agents:
    - codebase
    - web-researcher
    - reviewer
  agent_models:
    codebase: fast
  max_parallel: 3
  max_depth: 1
  timeout: 600

shell:
  allow:
    - "pwd"
    - "go build*"
    - "go test*"
    - "go run*"
    - "go fmt*"
    - "npm *"
    - "yarn *"
    - "pnpm *"
    - "git diff*"
    - "git status"
    - "git log*"
    - "cargo build*"
    - "cargo test*"
    - "cargo fmt*"
    - "python *"
    - "pytest*"
    - "make *"

search: true
agents_md: "true"
max_turns: 300
enable_handover: true
handover_mode: "file"
