<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .IsHome }}term-llm docs{{ else }}{{ .Title }} · term-llm docs{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ if .IsHome }}term-llm docs{{ else }}{{ .Title }} · term-llm docs{{ end }}" />
    <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}" />
    <meta property="og:url" content="{{ .Permalink }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ if .IsHome }}term-llm docs{{ else }}{{ .Title }} · term-llm docs{{ end }}" />
    <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="{{ if not .IsHome }}docs-page{{ end }}">
    <div class="page-shell">
      {{ partial "header.html" . }}
      <main>
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
    </div>
    <script>
      document.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-copy-text]");
        if (!button) {
          return;
        }

        const text = button.getAttribute("data-copy-text") || "";
        const defaultLabel = button.getAttribute("data-copy-default") || button.textContent;
        const successLabel = button.getAttribute("data-copy-success") || "Copied";
        const failureLabel = "Copy failed";

        try {
          await navigator.clipboard.writeText(text);
          button.textContent = successLabel;
        } catch (_error) {
          button.textContent = failureLabel;
        }

        window.setTimeout(() => {
          button.textContent = defaultLabel;
        }, 1800);
      });
    </script>
  </body>
</html>
