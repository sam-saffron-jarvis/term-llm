services:
  {{AGENT_NAME}}:
    build:
      context: ${TERM_LLM_REPO:?Set TERM_LLM_REPO in .env}
      dockerfile: docker/Dockerfile
    image: term-llm
    container_name: {{AGENT_NAME}}
    env_file: .env
    volumes:
      - {{AGENT_NAME}}-state:/root
      - ./agents/{{AGENT_NAME}}:/seed/agents/{{AGENT_NAME}}:ro
      - ./services:/seed/services:ro
      - ./skills:/seed/skills:ro
      - ./scripts:/seed/scripts:ro
      - ./init.sh:/seed/init.sh:ro
    environment:
      AGENT_NAME: {{AGENT_NAME}}
    ports:
      - "${WEB_PORT:-8081}:8081"
    restart: unless-stopped
    # Uncomment for GPU access:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
    # Uncomment for static IP on an existing network:
    # networks:
    #   lan:
    #     ipv4_address: 10.0.0.53

volumes:
  {{AGENT_NAME}}-state:

